<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Georgielasok.tv | Watch</title>
    <style>
        /* --- GLOBAL STYLES --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #f9f9f9;
            color: #0f0f0f;
        }

        /* --- HEADER / NAVIGATION --- */
        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background: white;
            border-bottom: 1px solid #ddd;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-weight: bold;
            font-size: 1.4rem;
            color: #ff0000;
        }

        .search-bar {
            display: flex;
            flex: 0.5;
        }

        .search-bar input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #ccc;
            border-radius: 20px 0 0 20px;
            outline: none;
        }

        .search-bar button {
            padding: 8px 15px;
            border: 1px solid #ccc;
            border-left: none;
            border-radius: 0 20px 20px 0;
            background: #f8f8f8;
            cursor: pointer;
        }

        /* --- LAYOUT --- */
        .container {
            display: grid;
            grid-template-columns: 1fr 350px; /* Desktop side-by-side */
            gap: 24px;
            max-width: 1300px;
            margin: 20px auto;
            padding: 0 20px;
        }

        /* --- VIDEO PLAYER --- */
        .video-player video {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: black;
            border-radius: 12px;
        }

        .video-info h1 {
            font-size: 1.3rem;
            margin: 15px 0 5px;
        }

        .stats {
            color: #606060;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }

        hr { border: 0; border-top: 1px solid #eee; margin: 15px 0; }

        .channel-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            background: #ddd;
            border-radius: 50%;
        }

        .sub-btn {
            background: #0f0f0f;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            margin-left: auto;
        }

        /* --- SIDEBAR --- */
        .sidebar h3 { font-size: 1rem; margin-bottom: 15px; }

        .side-card {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
            cursor: pointer;
        }

        .side-card img {
            width: 160px;
            aspect-ratio: 16 / 9;
            object-fit: cover;
            border-radius: 8px;
            background: #eee;
        }

        .side-content h4 {
            font-size: 0.9rem;
            line-height: 1.2;
            margin-bottom: 4px;
        }

        .side-content p {
            font-size: 0.8rem;
            color: #606060;
        }

        /* --- MOBILE RESPONSIVENESS --- */
        @media (max-width: 1024px) {
            .container {
                grid-template-columns: 1fr; /* Sidebar stacks below */
                padding: 0 10px;
            }

            .search-bar {
                display: none; /* Cleans up header on mobile */
            }

            .video-player video {
                border-radius: 0; /* Full screen look on mobile */
            }
        }

        @media (max-width: 480px) {
            .side-card img {
                width: 120px;
            }
            
            .video-info h1 {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>

    <header class="top-nav">
        <div class="logo">Georgielasok.tv</div>
        <div class="search-bar">
            <input type="text" placeholder="Search videos...">
            <button>Search</button>
        </div>
        <div class="user-icons">Profile</div>
    </header>

    <main class="container">
        <section class="video-column">
            <div class="video-player">
                <video controls poster="https://via.placeholder.com/800x450">
                    <source src="rick.mp4" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
            </div>

            <div class="video-info">
                <h1>Number 1 ka ba? Pwede Pa-isa?</h1>
                <div class="stats">1,240,500 views • Mar 17, 2026</div>
                <hr>
                <div class="channel-info">
                    <div class="avatar"></div>
                    <div class="channel-text">
                        <strong>Goutitibo</strong>
                        <p>1.2M Subscribers</p>
                    </div>
                    <button class="sub-btn">$0.01/month</button>
                </div>
                <p class="description">
                    </p>
            </div>
        </section>

        <aside class="sidebar">
            <h3>Up Next</h3>
            <div class="side-card">
                <img src="awesome.png" alt="thumbnail">
                <div class="side-content">
                    <h4>Nagpapicture ang mga baddies nauwi sa alam nyo na</h4>
                    <p>George D. Gout</p>
                </div>
            </div>
            <div class="side-card">
                <img src="what.png" alt="thumbnail">
                <div class="side-content">
                    <h4>"Lakas mag assume ah...papwet yarn?"</h4>
                    <p>Milk my dih</p>
                </div>
            </div>
        </aside>
    </main>

</body>
</html>
